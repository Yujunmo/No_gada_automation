<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Oracle SQL 테이블 추출</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 20px; }
        textarea { width: 100%; height: 240px; font-family: monospace; font-size: 13px; padding: 10px; box-sizing: border-box; }
        button { margin-top: 10px; padding: 8px 20px; font-size: 14px; cursor: pointer; }
        #notice { background: #fff8e1; border-left: 4px solid #f9a825; padding: 10px 14px; margin: 20px 0; font-size: 13px; }
        #result { margin-top: 20px; }
        #result ul { background: #f5f5f5; padding: 12px 30px; border-radius: 4px; }
        #result li { font-family: monospace; }
        #error { color: #c62828; background: #ffebee; padding: 10px 14px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>
    <h1>Oracle SQL 테이블 추출</h1>

    <div id="notice">
        <strong>주의:</strong> 이 툴은 텍스트 파싱만 수행합니다.
        결과 리스트에 뷰가 포함될 수 있으니 이관 전에 확인하십시오.
        스키마 프리픽스(<code>SCOTT.EMP</code>)와 DB 링크(<code>EMP@DB1</code>)는 제거되어 표시되므로,
        크로스 스키마/DB 참조 여부는 SQL 원본을 병행 확인하십시오.
    </div>

    <textarea id="sql" placeholder="Oracle SQL 한 문장을 붙여넣으세요..."></textarea>
    <br>
    <button id="submit">추출</button>

    <div id="result"></div>

    <script>
        const btn = document.getElementById("submit");
        const sqlEl = document.getElementById("sql");
        const resultEl = document.getElementById("result");

        btn.addEventListener("click", async () => {
            resultEl.innerHTML = "";
            const sql = sqlEl.value;
            try {
                const res = await fetch("/extract", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({sql}),
                });
                const data = await res.json();
                if (!res.ok) {
                    resultEl.innerHTML = `<div id="error">${data.detail}</div>`;
                    return;
                }
                if (data.tables.length === 0) {
                    resultEl.innerHTML = "<p>추출된 테이블이 없습니다.</p>";
                    return;
                }
                const items = data.tables.map(t => `<li>${t}</li>`).join("");
                resultEl.innerHTML = `<p>${data.tables.length}개 테이블:</p><ul>${items}</ul>`;
            } catch (e) {
                resultEl.innerHTML = `<div id="error">요청 실패: ${e.message}</div>`;
            }
        });
    </script>
</body>
</html>
